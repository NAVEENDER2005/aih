spring.application.name=backend

# -------------------------------
# PostgreSQL Configuration
# -------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/hiri
spring.datasource.username=postgres
spring.datasource.password=512020
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------------
# JPA / Hibernate
# -------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------
# JWT Configuration
# -------------------------------
jwt.secret=supersecretkeywhichyoushouldreplaceinproductionwithabetterkey
jwt.expiration=86400000

# -------------------------------
# FastAPI Integration
# -------------------------------
fastapi.url=http://127.0.0.1:8000

# -------------------------------
# Disable H2 Console (important)
# -------------------------------
spring.h2.console.enabled=false