version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aihirer-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 512020
      POSTGRES_DB: aihirer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
